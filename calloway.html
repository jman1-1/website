<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calloyway's Revenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #dvd-img { position: fixed; width: 800px; }
    #fire { position: fixed; bottom: 0; left: 0; width: 100%; display: block; }
  </style>
</head>
<body>
  <img id="dvd-img" src="assets/calloway/temp.jpg">
  <img id="fire" src="assets/calloway/fire.gif">
  <audio id="music" preload="auto" loop>
    <source src="assets/calloway/scary.mp3" type="audio/mp3" />
  </audio>
  <script>
    const music = document.getElementById('music');
    const startMusic = () => {
      music.play();
       document.removeEventListener('pointerdown', startMusic);
      document.removeEventListener('keydown', startMusic);
      document.removeEventListener('touchstart', startMusic);
    };
    document.addEventListener('pointerdown', startMusic);
    document.addEventListener('keydown', startMusic);
    document.addEventListener('touchstart', startMusic);

    const img = document.getElementById('dvd-img');
    let x = Math.random() * (window.innerWidth - img.offsetWidth);
    let y = Math.random() * (window.innerHeight - img.offsetHeight);
    let dx = 1, dy = 1;

    function bounce() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const iw = img.offsetWidth;
      const ih = img.offsetHeight;

      x += dx;
      y += dy;

      if (x + iw >= w) { x = w - iw; dx = -Math.abs(dx); }
      if (x <= 0)       { x = 0;      dx =  Math.abs(dx); }
      if (y + ih >= h)  { y = h - ih; dy = -Math.abs(dy); }
      if (y <= 0)       { y = 0;      dy =  Math.abs(dy); }

      img.style.left = x + 'px';
      img.style.top  = y + 'px';
      requestAnimationFrame(bounce);
    }

    img.onload = bounce;
    if (img.complete) bounce();
  </script>
</body>
</html>
